<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankApp - Login / Signup</title>
    <link rel="stylesheet" href="style.css">
    
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: var(--gray);
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .hidden-fields {
            display: none;
        }
    </style>
    
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <h1 style="text-align:center; margin-bottom:20px;">🏦 BankApp</h1>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
                <button class="auth-tab" data-tab="forgot">Forgot Password</button>
            </div>

            <div class="hidden-fields">
                <input type="hidden" id="email">
                <input type="hidden" id="password">
                <input type="hidden" id="name">
                <input type="hidden" id="confirm-password">
            </div>

            <!-- Login Form -->
            <div id="login-form" class="auth-form active">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                    <div id="msg" class="message"></div>
                </form>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" class="auth-form">
                <form id="signupForm">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password (min. 6 characters)" required>
                        <small class="hint">Password must be at least 6 characters</small>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                    <div id="signup-msg" class="message"></div>
                </form>
            </div>

            <!-- Forgot Password Form -->
            <div id="forgot-form" class="auth-form">
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="reset-email">Email Address</label>
                        <input type="email" id="reset-email" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="btn-primary">Request Reset PIN</button>
                    
                    <div id="pin-section" style="display: none; margin-top: 20px;">
                        <div class="form-group">
                            <label for="reset-pin">Reset PIN</label>
                            <input type="text" id="reset-pin" placeholder="Enter 3-digit PIN" maxlength="3">
                        </div>
                        <div class="form-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" placeholder="Enter new password">
                        </div>
                        <button type="button" onclick="resetPassword()" class="btn-primary">Reset Password</button>
                    </div>
                    <div id="reset-msg" class="message"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const tabId = this.dataset.tab;
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                document.getElementById(tabId + '-form').classList.add('active');
            });
        });

        // Form submit handlers
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('email').value = document.getElementById('login-email').value;
            document.getElementById('password').value = document.getElementById('login-password').value;
            login();
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('name').value = document.getElementById('signup-name').value;
            document.getElementById('email').value = document.getElementById('signup-email').value;
            document.getElementById('password').value = document.getElementById('signup-password').value;
            document.getElementById('confirm-password').value = document.getElementById('signup-confirm').value;
            signup();
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            requestReset();
        });
    </script>


<!-- Some animations -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 1000,
        once: true,
        mirror: false
    });
</script>
</body>
</html>
